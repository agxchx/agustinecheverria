<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página Principal - Info</title>
  <style>
    body {
      margin: 0;
      background-color: rgb(255, 255, 255);
      color: #000;
      font-family: "Avenir", sans-serif;
    }

    .header {
      position: relative;
      height: 80px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #ddd;
      z-index: 10;
    }

    .nav-buttons a {
      margin: 0 10px;
      padding: 10px 20px;
      text-decoration: none;
      color: #000;
      border-radius: 5px;
      transition: background 0.3s;
      align-self: center;
    }
    .nav-buttons a.active,
    .nav-buttons a:hover {
      text-decoration: line-through;
    }

    .floating-button {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: transparent;
      color: #000;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 100;
    }

    .text-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      color: #fff;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.5em;
      z-index: 200;
    }
    .text-modal.active {
      display: flex;
    }

    .big-container {
      padding: 50px;
    }
    .big-container .modal-title-main {
      font-size: 2em;
      margin-bottom: 1px;
      left: 300px;
      font-weight: bold;
    }
    .logo {
     position: relative;
     left: 420px;
     top: 2px;             /* Ajusta tamaño a tu gusto */
    }
    .social-logos {
    display: flex;            /* Coloca los elementos en línea */
    gap: 10px;                /* Separación entre iconos */
    align-items: center;      /* Centra verticalmente si hay diferentes alturas */
   }
   .social-logos2 {
    position: relative;
    right: 360px;
    display: flex;            /* Coloca los elementos en línea */
    gap: 10px;                /* Separación entre iconos */
    align-items: center;      /* Centra verticalmente si hay diferentes alturas */
   }
   .modal-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .photo {
      position: relative;
      display: flex;
      width: 500px;
      height: 500px;
      left: 100px;
    }
    .title-text{
      position: relative;
      font-size: 1.4em;
      font-weight: bold;
      right: -20px;
    }
    .contact-container{
        position: relative;
        display: flex;
        flex-direction: column;
        top: 150px;
        left: 150px;
        gap: 20px;
    }
    .description {
      font-size: 0.95em;
      line-height: 1.4;
      color: #918e8e;
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="nav-buttons">
      <a href="/">home</a>
      <a href="/agustinecheverria/work/" >\work</a>
      <a href="/agustinecheverria/contact/"class="active">\contact</a>
      <a href="/agustinecheverria/media.html">\media</a>
    </nav>

    <div class="social-logos">
      <a href="https://www.linkedin.com/in/agustin-echeverria/" target="_blank" rel="noopener noreferrer">
        <img src="/work/linkedin-logo-linkedin-logo-transparent-linkedin-icon-transparent-free-free-png.webp" alt="linkedin" class="logo" style="width: 35px;">
      </a>
    
      <a href="https://www.instagram.com/agxchitx/" target="_blank" rel="noopener noreferrer">
        <img src="/work/87390.png" alt="insta" class="logo" style="height: 26px; width: 26px;">
      </a>
    </div>    
  </header>

  <div class="floating-button" onclick="toggleTextModal()">((-mañana info-))</div>

  <div class="text-modal" id="textModal" onclick="closeTextModal(event)">
    <p>Escribiendo...</p>
  </div>

  <main class="big-container" style="display: flex; flex-direction: row;">
    <div> 
     <img src="/work/agx 1.jpg" id="photo" class="photo"></div>
     <div id="contact-container" class="contact-container">
     <div id="title-text" class="title-text">Agustin Echeverria</div>
     <div id="description" class="description">+34 636542538 | +593 979270062</div>
     <div id="description" class="description">agustinecheverriasonido@gmail.com</div>
     <div class="social-logos2">
        <a href="https://www.linkedin.com/in/agustin-echeverria/" target="_blank" rel="noopener noreferrer">
          <img src="/work/linkedin-logo-linkedin-logo-transparent-linkedin-icon-transparent-free-free-png.webp" alt="linkedin" class="logo" style="width: 35px; color: #918e8e;">
        </a>
      
        <a href="https://www.instagram.com/agxchitx/" target="_blank" rel="noopener noreferrer">
          <img src="/work/87390.png" alt="insta" class="logo" style="height: 26px; width: 26px; color: #918e8e;">
        </a>

        <a href="https://drive.google.com/file/d/1iexsnluGSQL7gSL0AXjlw3p6QJyu3Ph1/view?usp=share_link" target="_blank" rel="noopener noreferrer">
            <img src="521136d25b37386f49728b93d2e4e6fa.png" alt="insta" class="logo" style="height: 32px; width: 32px; top: -1px; color: #918e8e;">
          </a>
      </div> 
    </div>
   
  </main>

  <script>
    function toggleTextModal() {
      document.getElementById('textModal').classList.toggle('active');
    }
    function closeTextModal(e) {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.remove('active');
      }
    }
  </script>
</body>
</html>
